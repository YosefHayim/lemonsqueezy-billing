# Automated Release Workflow
# ─────────────────────────
# Bumps version, builds, publishes to npm, creates GitHub Release + tag
# when a PR is merged into `master`.
#
# Version bump is determined by PR labels:
#   - `major` → breaking changes (1.0.0 → 2.0.0)
#   - `minor` → new features    (1.0.0 → 1.1.0)
#   - `patch` → bug fixes       (1.0.0 → 1.0.1)  [default]
#   - `no-release` → skip entirely
#
# Secrets required:
#   - NPM_TOKEN: classic npm automation token (Settings → Secrets → Actions)

name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'no-release')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Bump version in package.json
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION (${{ steps.bump.outputs.type }})"

      - name: Commit version bump and create tag
        run: |
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): ${{ steps.version.outputs.version }}"
          git tag -a "${{ steps.version.outputs.version }}" -m "chore(release): ${{ steps.version.outputs.version }}"
          git push origin master --follow-tags

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest
