name: Publish Package

on:
  push:
    branches: [master]
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if version needs publishing
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NPM_LATEST=$(npm view fresh-squeezy version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$NPM_LATEST" ]; then
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT already on npm — skipping"
          else
            echo "needs_publish=true" >> "$GITHUB_OUTPUT"
            echo "New version $CURRENT (npm has $NPM_LATEST) — will publish"
          fi

      - name: Typecheck
        if: steps.check.outputs.needs_publish == 'true'
        run: pnpm run typecheck

      - name: Build
        if: steps.check.outputs.needs_publish == 'true'
        run: pnpm run build

      - name: Update npm for trusted publishing support
        if: steps.check.outputs.needs_publish == 'true'
        run: npm install -g npm@latest

      - name: Tag and create GitHub Release
        if: steps.check.outputs.needs_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.check.outputs.current }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_HASH=$(git log -1 --pretty=format:"%h")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$COMMIT_MSG" 2>/dev/null || echo "Tag $TAG already exists"
          git push origin "$TAG" 2>/dev/null || echo "Tag $TAG already pushed"
          gh release create "$TAG" \
            --title "$TAG — $COMMIT_MSG" \
            --notes "$(git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:'- %s ([%h](https://github.com/YosefHayim/fresh-squeezy/commit/%H))' 2>/dev/null)" \
            --latest 2>/dev/null || echo "Release $TAG already exists"

      - name: Publish to npm
        if: steps.check.outputs.needs_publish == 'true'
        run: pnpm publish --no-git-checks --access public --provenance
